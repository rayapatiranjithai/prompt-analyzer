name: Feature request
description: Suggest an improvement or new capability for prompt-analyzer
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The gap or frustration you're hitting today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like it to do. Sketch the output/behavior if you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - analyze-prompt (coaching / scoring)
        - prompt-report (session summary)
        - hooks (auto-invocation)
        - privacy / redaction
        - new metric / statistic
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
